name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build
        run: |
          xcodebuild \
            -project CirrondlyDesk.xcodeproj \
            -scheme CirrondlyDesk \
            -configuration Debug \
            -destination 'platform=macOS' \
            build | xcpretty && exit ${PIPESTATUS[0]}

      - name: Test
        run: |
          xcodebuild \
            -project CirrondlyDesk.xcodeproj \
            -scheme CirrondlyDesk \
            -destination 'platform=macOS' \
            test | xcpretty && exit ${PIPESTATUS[0]}