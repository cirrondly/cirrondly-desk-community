name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      APP_NAME: Cirrondly Desk Community
      TAG_NAME: ${{ inputs.release_tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Select Xcode
        run: |
          set -euo pipefail
          shopt -s nullglob

          candidates=(/Applications/Xcode.app /Applications/Xcode_*.app)
          selected=""

          for candidate in "${candidates[@]}"; do
            if [[ -d "$candidate" ]]; then
              sudo xcode-select -s "$candidate/Contents/Developer"
              echo "DEVELOPER_DIR=$candidate/Contents/Developer" >> "$GITHUB_ENV"
              selected="$candidate"
              break
            fi
          done

          if [[ -z "$selected" ]]; then
            echo "No Xcode installation found under /Applications" >&2
            exit 1
          fi

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show Swift version
        run: swift --version

      - name: Detect signing availability
        id: signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          for variable in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_TEAM_ID KEYCHAIN_PASSWORD; do
            if [[ -z "${!variable:-}" ]]; then
              missing+=("$variable")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Signing secrets missing, building unsigned release: %s\n' "${missing[*]}"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple Developer certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build release app
        run: |
          set -o pipefail
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          xcodebuild \
            -project CirrondlyDesk.xcodeproj \
            -scheme CirrondlyDesk \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA" \
            -resultBundlePath "$RUNNER_TEMP/release-build.xcresult" \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            build 2>&1 | tee "$RUNNER_TEMP/release-build.log"

      - name: Sign app bundle
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          APP_PATH="$DERIVED_DATA/Build/Products/Release/$APP_NAME.app"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "Expected app bundle not found at $APP_PATH" >&2
            exit 1
          fi

          codesign \
            --force \
            --deep \
            --options runtime \
            --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Notarize and staple app bundle
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          APP_PATH="$DERIVED_DATA/Build/Products/Release/$APP_NAME.app"
          ZIP_PATH="$RUNNER_TEMP/$APP_NAME.zip"

          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Package DMG
        id: package
        run: |
          set -euo pipefail

          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          APP_PATH="$DERIVED_DATA/Build/Products/Release/$APP_NAME.app"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "Expected app bundle not found at $APP_PATH" >&2
            exit 1
          fi

          STAGE_DIR="$RUNNER_TEMP/dmg-stage"
          ARTIFACTS_DIR="$RUNNER_TEMP/release-artifacts"
          DMG_NAME="Cirrondly-Desk-Community-${TAG_NAME}.dmg"
          DMG_PATH="$ARTIFACTS_DIR/$DMG_NAME"

          rm -rf "$STAGE_DIR" "$ARTIFACTS_DIR"
          mkdir -p "$STAGE_DIR" "$ARTIFACTS_DIR"

          cp -R "$APP_PATH" "$STAGE_DIR/"
          ln -s /Applications "$STAGE_DIR/Applications"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGE_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Sign, notarize, and staple DMG
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          DMG_PATH="${{ steps.package.outputs.dmg_path }}"

          codesign \
            --force \
            --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$DMG_PATH"

          codesign --verify --verbose=2 "$DMG_PATH"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Generate checksum
        id: checksum
        run: |
          set -euo pipefail

          DMG_PATH="${{ steps.package.outputs.dmg_path }}"

          shasum -a 256 "$DMG_PATH" > "$DMG_PATH.sha256"
          echo "sha_path=$DMG_PATH.sha256" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.dmg_path }}
            ${{ steps.checksum.outputs.sha_path }}

      - name: Upload release diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-diagnostics
          path: |
            ${{ runner.temp }}/release-build.log
            ${{ runner.temp }}/release-build.xcresult