name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Select Xcode
        run: |
          set -euo pipefail
          shopt -s nullglob

          candidates=(/Applications/Xcode.app /Applications/Xcode_*.app)
          selected=""

          for candidate in "${candidates[@]}"; do
            if [[ -d "$candidate" ]]; then
              sudo xcode-select -s "$candidate/Contents/Developer"
              echo "DEVELOPER_DIR=$candidate/Contents/Developer" >> "$GITHUB_ENV"
              selected="$candidate"
              break
            fi
          done

          if [[ -z "$selected" ]]; then
            echo "No Xcode installation found under /Applications" >&2
            exit 1
          fi

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show Swift version
        run: swift --version

      - name: Build release app
        env:
          DERIVED_DATA: ${{ runner.temp }}/DerivedData
        run: |
          set -o pipefail
          xcodebuild \
            -project CirrondlyDesk.xcodeproj \
            -scheme CirrondlyDesk \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA" \
            -resultBundlePath "$RUNNER_TEMP/release-build.xcresult" \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            build 2>&1 | tee "$RUNNER_TEMP/release-build.log"

      - name: Package DMG
        id: package
        env:
          DERIVED_DATA: ${{ runner.temp }}/DerivedData
          APP_NAME: Cirrondly Desk Community
          TAG_NAME: ${{ inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail

          APP_PATH="$DERIVED_DATA/Build/Products/Release/$APP_NAME.app"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "Expected app bundle not found at $APP_PATH" >&2
            exit 1
          fi

          STAGE_DIR="$RUNNER_TEMP/dmg-stage"
          ARTIFACTS_DIR="$RUNNER_TEMP/release-artifacts"
          DMG_NAME="Cirrondly-Desk-Community-${TAG_NAME}.dmg"
          DMG_PATH="$ARTIFACTS_DIR/$DMG_NAME"

          rm -rf "$STAGE_DIR" "$ARTIFACTS_DIR"
          mkdir -p "$STAGE_DIR" "$ARTIFACTS_DIR"

          cp -R "$APP_PATH" "$STAGE_DIR/"
          ln -s /Applications "$STAGE_DIR/Applications"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGE_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          shasum -a 256 "$DMG_PATH" > "$DMG_PATH.sha256"

          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "sha_path=$DMG_PATH.sha256" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.dmg_path }}
            ${{ steps.package.outputs.sha_path }}

      - name: Upload release diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-diagnostics
          path: |
            ${{ runner.temp }}/release-build.log
            ${{ runner.temp }}/release-build.xcresult